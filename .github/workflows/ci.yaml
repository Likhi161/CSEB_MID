name: CI pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:

# ---------------- SONAR ----------------
  sonar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=cseb_mid
            -Dsonar.sources=.

      - uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ---------------- SNYK ----------------
  snyk:
    runs-on: ubuntu-latest
    needs: sonar

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --exit-code=0

# ---------------- DOCKER + GITOPS ----------------
  docker:
    runs-on: ubuntu-latest
    needs: snyk

    steps:
      - uses: actions/checkout@v4

      # 🔥 Image name with SHA
      - name: Set image name
        run: |
          echo "IMAGE_NAME=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> $GITHUB_ENV
          echo "CACHE_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:buildcache" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 🚀 Build + Cache + Push
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=registry,ref=${{ env.CACHE_IMAGE }}
          cache-to: type=registry,ref=${{ env.CACHE_IMAGE }},mode=max

      # 🔄 Update YAML
      - name: Update Kubernetes manifest
        run: |
          sed -i "s|image:.*|image: $IMAGE_NAME|g" k8s/app-deployment.yaml

      # 🔁 Push back to repo
      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add k8s/app-deployment.yaml
          git commit -m "Update image to $IMAGE_NAME" || echo "No changes"
          git push