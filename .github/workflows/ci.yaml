name: CI

on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
jobs:

# ---------------- SONARQUBE JOB ----------------
  sonar:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=cseb_mid
            -Dsonar.sources=.

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

# ---------------- SNYK JOB ----------------
  snyk:
    name: Snyk Security Scan
    runs-on: ubuntu-latest
    needs: sonar   # runs after sonar (remove if you want parallel)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Run Snyk Scan (SCA)
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium --exit-code=0
      

# ---------------- FAILURE EMAIL JOB ----------------
  notify:
    name: Send Failure Email
    runs-on: ubuntu-latest
    needs: [sonar, snyk]
    if: failure()

    steps:
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "❌ CI Pipeline Failed - CSEB_MID"

          body: |
            🚨 CI PIPELINE FAILURE ALERT 🚨

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Commit: ${{ github.sha }}

            ❌ Failed Job:
            - SonarQube OR Snyk

            🔗 Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            👨‍💻 Triggered by: ${{ github.actor }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: "DevOps Alerts <${{ secrets.EMAIL_USERNAME }}>"
  docker:
    runs-on: ubuntu-latest
    needs: [sonar, snyk]
    permissions:
      contents: read
      packages: write
    steps:
# ---------------- CHECKOUT ----------------
      - name: Checkout Repository
        uses: actions/checkout@v4

# ---------------- BUILD IMAGE ----------------
      - name: Build Docker Image
        run: docker build -t $IMAGE_NAME .

# ---------------- TRIVY SCAN ----------------
      - name: Trivy Scan (Fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          severity: CRITICAL,HIGH
          exit-code: 0
          ignore-unfixed: true

# ---------------- LOGIN ----------------
      - name: Login to GHCR
        if: success()
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

# ---------------- PUSH ----------------
      - name: Push Image
        if: success()
        run: docker push $IMAGE_NAME

# ---------------- SUCCESS EMAIL ----------------
      - name: Send Success Email
        if: success()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "✅ Docker Pipeline Success"

          body: |
            🎉 Docker pipeline completed successfully!

            Image:
            ${{ env.IMAGE_NAME }}

            Repo:
            ${{ github.repository }}

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: "DevOps Alerts <${{ secrets.EMAIL_USERNAME }}>"

# ---------------- FAILURE EMAIL ----------------
      - name: Send Failure Email
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}

          subject: "❌ Docker Pipeline Failed"

          body: |
            🚨 Docker pipeline failed!

            Repo:
            ${{ github.repository }}

            Possible causes:
            - Trivy vulnerabilities
            - Build failure

            Logs:
            ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          to: ${{ secrets.RECIVER_EMAIL }}
          from: "DevOps Alerts <${{ secrets.EMAIL_USERNAME }}>"